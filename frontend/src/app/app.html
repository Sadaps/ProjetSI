<div class="dashboard-container">
  <nav class="sidebar">
    <div class="logo">
      <h2>StockPro</h2>
      <small>Gestion industrielle</small>
    </div>
    <ul class="nav-links">
      <li class="active">Tableau de bord</li>
      <li>Gestion des stocks</li>
      <li>Réception</li>
      <li>Fournisseurs</li>
    </ul>
  </nav>

  <main class="content">

      <input type="text" placeholder="Rechercher un produit, lot...">
      <div class="user-info">🔔 Jean Dupont</div>

    <section class="dashboard-body">

        <div class="card orange">

        <div class="card yellow">
          <small>Péremptions Proches</small>
          <div class="value">2</div>
        </div>
        <div class="card red">
          <small>Lots Périmés</small>
          <div class="value">0</div>
        </div>
      </div>
      
      </section>
